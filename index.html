<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You When I'm Gone</title>

<style>
body {
  margin: 0;
  background: #1a120b;
  font-family: Georgia, serif;
}

/* CLOSED BOOK */
#closedStage {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.book-cover {
  width: 320px;
  height: 460px;
  cursor: pointer;
}

.book-cover img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* OPEN BOOK */
#openedStage {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.open-book {
  width: 900px;
  height: 600px;
  display: grid;
  grid-template-columns: 1fr 1fr;
}

.left-page {
  background: #5a3a20;
}

.right-page {
  background: #fffaf2;
  color: #4a2d1a;
  padding: 20px;
}
</style>
</head>

<body>

<!-- CLOSED -->
<div id="closedStage">
  <div class="book-cover" onclick="openBook()">
    <img src="book.jpg" alt="Book Cover">
  </div>
</div>

<!-- OPEN -->
<div id="openedStage">
  <div class="open-book">
    <div class="left-page"></div>

    <div class="right-page">
      <h1>Book Index</h1>
      <p onclick="goToPage(1)">Chapter 1 — About You</p>
      <p onclick="goToPage(2)">Chapter 2 — Father</p>
      <p onclick="goToPage(3)">Chapter 3 — Mother</p>

      <div id="pageContent"></div>
    </div>
  </div>
</div>

<script>
function openBook(){
  document.getElementById("closedStage").style.display = "none";
  document.getElementById("openedStage").style.display = "flex";
}

function goToPage(n){
  let content = "";

  if(n===1) content = "<h2>About You</h2>";
  if(n===2) content = "<h2>Father</h2>";
  if(n===3) content = "<h2>Mother</h2>";

  document.getElementById("pageContent").innerHTML = content;
}
</script>

</body>
</html>
