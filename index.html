<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You When I'm Gone</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: linear-gradient(to bottom, #2b1d14, #120d09);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .hidden {
      display: none;
    }

    .book-cover {
      width: 320px;
      height: 460px;
      background: linear-gradient(135deg, #6b4423, #3d2412);
      border: 4px solid #b88a44;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      cursor: pointer;
    }

    .book-cover::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 28px;
      height: 100%;
      background: rgba(0,0,0,0.2);
      border-radius: 14px 0 0 14px;
    }

    .cover-title {
      font-size: 34px;
      color: #f0d18a;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .cover-subtitle {
      color: #f7e7c5;
      font-size: 16px;
      max-width: 220px;
      line-height: 1.6;
      font-style: italic;
    }

    .tap-note {
      position: absolute;
      bottom: 20px;
      font-size: 13px;
      color: #e5c37c;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .book-open {
      width: 100%;
      max-width: 460px;
      background: #f7ead7;
      color: #4a2d1a;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      overflow: hidden;
      border: 2px solid #c4a06b;
    }

    .page {
      padding: 28px;
      min-height: 580px;
      box-sizing: border-box;
      position: relative;
    }

    .page-kicker {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #a06d35;
      margin-bottom: 14px;
    }

    h1, h2 {
      margin-top: 0;
    }

    .menu-button {
      display: block;
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 12px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background: #9b5d3a;
      color: white;
      cursor: pointer;
      text-align: left;
    }

    .message-box {
      background: white;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      font-size: 20px;
      line-height: 1.7;
      min-height: 220px;
      margin-top: 20px;
    }

    .page-panel {
      display: none;
    }

    .page-panel.active {
      display: block;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 24px;
    }

    .nav-buttons button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background: #7b4e2f;
      color: white;
      cursor: pointer;
    }

    .nav-buttons button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div id="cover" class="book-cover" onclick="openBook()">
    <div class="cover-title">For You When I'm Gone</div>
    <div class="cover-subtitle">Everything I wanted you to remember, know, and feel.</div>
    <div class="tap-note">Tap to open</div>
  </div>

  <div id="book" class="book-open hidden">
    <div class="page">

      <div id="panel1" class="page-panel active">
        <div class="page-kicker">Page 1</div>
        <h2>Open When You Need Me</h2>
        <p>Choose what you need right now.</p>

        <button class="menu-button" onclick="showMessage('love')">❤️ When you need love</button>
        <button class="menu-button" onclick="showMessage('strength')">💪 When you need strength</button>
        <button class="menu-button" onclick="showMessage('miss')">😢 When you miss me</button>
        <button class="menu-button" onclick="showMessage('smile')">😊 When you need a smile</button>

        <div class="nav-buttons">
          <button disabled>← Back</button>
          <button onclick="goToPanel(2)">Next →</button>
        </div>
      </div>

      <div id="panel2" class="page-panel">
        <div class="page-kicker">Page 2</div>
        <h2>Your Message Page</h2>

        <div class="message-box" id="messageBox">
          Tap one of the message buttons on Page 1 first.
        </div>

        <div class="nav-buttons">
          <button onclick="goToPanel(1)">← Back</button>
          <button disabled>Next →</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    function openBook() {
      document.getElementById("cover").classList.add("hidden");
      document.getElementById("book").classList.remove("hidden");
    }

    function goToPanel(panelNumber) {
      document.querySelectorAll(".page-panel").forEach(panel => {
        panel.classList.remove("active");
      });
      document.getElementById("panel" + panelNumber).classList.add("active");
    }

    function showMessage(type) {
      const box = document.getElementById("messageBox");

      if (type === "love") {
        box.innerHTML = "I love you more than words can ever explain. That never changes.";
      } else if (type === "strength") {
        box.innerHTML = "You are stronger than you know, and I always believed in you.";
      } else if (type === "miss") {
        box.innerHTML = "Even when you miss me, remember that love does not leave. I am with you in that.";
      } else if (type === "smile") {
        box.innerHTML = "Think of one of our good moments and smile for me. I would want that.";
      }

      goToPanel(2);
    }
  </script>

</body>
</html>
