<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For You When I'm Gone</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #1a120b;
  color: white;
}

/* CLOSED BOOK */
#closedStage {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.book-cover {
  width: 300px;
  height: 420px;
  background: #4b2e19;
  border-radius: 8px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

.book-cover span {
  color: #e0c48f;
  font-size: 22px;
}

/* OPEN BOOK */
#openedStage {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.open-book {
  width: 900px;
  height: 600px;
  display: grid;
  grid-template-columns: 1fr 1fr;
}

/* LEFT PAGE */
.left-page {
  background: #5a3a20;
}

/* RIGHT PAGE */
.right-page {
  background: #fffaf2;
  color: #4a2d1a;
  padding: 20px;
  overflow-y: auto;
}

button {
  margin-top: 20px;
}
</style>
</head>

<body>

<!-- CLOSED -->
<div id="closedStage">
  <div class="book-cover" onclick="openBook()">
    <span>Tap to Open</span>
  </div>
</div>

<!-- OPEN -->
<div id="openedStage">
  <div class="open-book">
    <div class="left-page"></div>

    <div class="right-page">
      <h1>Book Index</h1>

      <p onclick="goToPage(1)">Chapter 1 — About You</p>
      <p onclick="goToPage(2)">Chapter 2 — Father</p>
      <p onclick="goToPage(3)">Chapter 3 — Mother</p>

      <div id="pageContent"></div>

      <button onclick="goToIndex()">Back to Index</button>
    </div>
  </div>
</div>

<script>
function openBook(){
  document.getElementById("closedStage").style.display = "none";
  document.getElementById("openedStage").style.display = "flex";
}

function goToIndex(){
  document.getElementById("pageContent").innerHTML = "";
}

function goToPage(n){
  let content = "";

  if(n===1){
    content = "<h2>About You</h2><p>This is your story page.</p>";
  }
  if(n===2){
    content = "<h2>Father</h2><p>Story about your father.</p>";
  }
  if(n===3){
    content = "<h2>Mother</h2><p>Story about your mother.</p>";
  }

  document.getElementById("pageContent").innerHTML = content;
}
</script>

</body>
</html>
