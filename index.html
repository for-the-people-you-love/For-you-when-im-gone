<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You When I'm Gone</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background:
        radial-gradient(circle at top, rgba(255,220,170,0.08), transparent 30%),
        linear-gradient(to bottom, #2b1d14, #120d09);
      min-height: 100vh;
      color: white;
      overflow-x: auto;
    }

    .hidden {
      display: none;
    }

    .stage {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      box-sizing: border-box;
    }

    .cover-stage {
      width: 300px;
      height: 430px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 30%),
        linear-gradient(135deg, #6b4423, #3d2412);
      border: 4px solid #c7964b;
      border-radius: 18px;
      box-shadow:
        0 26px 50px rgba(0,0,0,0.55),
        inset 0 0 0 2px rgba(255,230,180,0.08);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      cursor: pointer;
      overflow: hidden;
    }

    .cover-stage::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 26px;
      height: 100%;
      background: linear-gradient(to right, rgba(0,0,0,0.28), rgba(255,255,255,0.05));
      border-radius: 14px 0 0 14px;
    }

    .cover-stage::after {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(240,209,138,0.65);
      border-radius: 10px;
      pointer-events: none;
    }

    .cover-title {
      font-size: 32px;
      color: #f0d18a;
      line-height: 1.2;
      margin-bottom: 18px;
      text-shadow: 0 1px 0 rgba(0,0,0,0.25);
    }

    .cover-subtitle {
      color: #f7e7c5;
      font-size: 15px;
      max-width: 220px;
      line-height: 1.6;
      font-style: italic;
    }

    .tap-note {
      position: absolute;
      bottom: 18px;
      font-size: 12px;
      color: #e5c37c;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .open-wrap {
      min-height: 100vh;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      padding: 16px;
      box-sizing: border-box;
      overflow-x: auto;
    }

    .open-book {
      width: 900px;
      max-width: none;
      height: 620px;
      display: grid;
      grid-template-columns: 1fr 20px 1fr;
      flex: 0 0 auto;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }

    .left-cover-back {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.05), transparent 30%),
        linear-gradient(135deg, #5e3b1f, #3a2312);
      border: 4px solid #c7964b;
      border-right: none;
      border-radius: 22px 0 0 22px;
      position: relative;
      box-shadow:
        inset 0 0 30px rgba(0,0,0,0.22),
        inset -10px 0 20px rgba(255,255,255,0.04);
    }

    .left-cover-back::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(240,209,138,0.45);
      border-radius: 10px;
    }

    .left-cover-back::after {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      width: 16px;
      height: 100%;
      background: linear-gradient(to left, rgba(0,0,0,0.25), rgba(255,255,255,0.04));
    }

    .spine {
      background:
        linear-gradient(to right, #6f5130, #d8c29c 40%, #6f5130 70%, #4a341f);
      box-shadow:
        inset 0 0 10px rgba(255,255,255,0.18),
        inset 0 0 12px rgba(0,0,0,0.2);
    }

    .right-page {
      background:
        linear-gradient(to right, #f0dfc3 0%, #fbf4e8 10%, #fffaf2 100%);
      color: #4a2d1a;
      border: 4px solid #d6bb90;
      border-left: none;
      border-radius: 0 22px 22px 0;
      padding: 28px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    .right-page::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 26px;
      height: 100%;
      background: linear-gradient(to right, rgba(0,0,0,0.08), rgba(255,255,255,0.35));
      pointer-events: none;
    }

    .page-kicker {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #a06d35;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    .right-page h1 {
      margin-top: 0;
      font-size: 36px;
      line-height: 1.1;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    .intro {
      font-size: 17px;
      line-height: 1.7;
      margin-bottom: 22px;
      color: #6a4931;
      position: relative;
      z-index: 1;
    }

    .menu-button {
      display: block;
      width: 100%;
      padding: 15px 16px;
      margin-bottom: 12px;
      font-size: 18px;
      border: none;
      border-radius: 14px;
      background: #9b5d3a;
      color: white;
      cursor: pointer;
      text-align: left;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      position: relative;
      z-index: 1;
    }

    .message-box {
      background: rgba(255,255,255,0.92);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      font-size: 19px;
      line-height: 1.8;
      margin-top: 20px;
      min-height: 120px;
      position: relative;
      z-index: 1;
    }

    .arrow-row {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      position: relative;
      z-index: 1;
    }

    .arrow-btn {
      padding: 12px 18px;
      font-size: 17px;
      border: none;
      border-radius: 12px;
      background: #7b4e2f;
      color: white;
      cursor: pointer;
    }

    .arrow-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div id="closedStage" class="stage">
    <div id="closedBook" class="cover-stage" onclick="openBook()">
      <div class="cover-title">For You When I'm Gone</div>
      <div class="cover-subtitle">Everything I wanted you to remember, know, and feel.</div>
      <div class="tap-note">Tap to open</div>
    </div>
  </div>

  <div id="openedStage" class="open-wrap hidden">
    <div id="openedBook" class="open-book">
      <div class="left-cover-back"></div>

      <div class="spine"></div>

      <div class="right-page">
        <div class="page-kicker">Page 1</div>
        <h1>Open When You Need Me</h1>
        <div class="intro">
          This is the working page on the right side of the book.
          Choose what you need right now.
        </div>

        <button class="menu-button" onclick="showMessage('love')">❤️ When you need love</button>
        <button class="menu-button" onclick="showMessage('strength')">💪 When you need strength</button>
        <button class="menu-button" onclick="showMessage('miss')">😢 When you miss me</button>
        <button class="menu-button" onclick="showMessage('smile')">😊 When you need a smile</button>

        <div id="messageBox" class="message-box">
          Tap one of the choices above to open a message.
        </div>

        <div class="arrow-row">
          <button class="arrow-btn" disabled>← Back</button>
          <button class="arrow-btn" disabled>Next →</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function openBook() {
      document.getElementById("closedStage").classList.add("hidden");
      document.getElementById("openedStage").classList.remove("hidden");
    }

    function showMessage(type) {
      const box = document.getElementById("messageBox");

      if (type === "love") {
        box.innerHTML = "I love you more than words can ever explain. That never changes.";
      } else if (type === "strength") {
        box.innerHTML = "You are stronger than you know, and I always believed in you.";
      } else if (type === "miss") {
        box.innerHTML = "Even when you miss me, remember that love does not leave. I am with you in that.";
      } else if (type === "smile") {
        box.innerHTML = "Think of one of our good moments and smile for me. I would want that.";
      }
    }
  </script>

</body>
</html>
