<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For You When I'm Gone</title><style>
body{
  margin:0;
  background:#3b2a1f;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:serif;
}

/* BOOK CLOSED */
.book-cover{
  width:320px;
  height:500px;
  background:linear-gradient(145deg,#6b4a2f,#4a3221);
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
  position:relative;
  color:gold;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.book-cover::before{
  content:"";
  position:absolute;
  inset:10px;
  border:2px solid gold;
  border-radius:10px;
}

.cover-title{
  font-size:28px;
  margin-bottom:20px;
}

.cover-vertical{
  position:absolute;
  right:10px;
  writing-mode:vertical-rl;
  transform:rotate(180deg);
  font-size:20px;
}

.cover-image{
  width:150px;
  height:180px;
  border:2px solid gold;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:20px 0;
}

.tap-text{
  position:absolute;
  bottom:15px;
  font-size:14px;
}

/* BOOK OPEN */
.book{
  display:none;
  width:360px;
  height:520px;
  background:#f4efe6;
  border-radius:10px;
  box-shadow:0 8px 20px rgba(0,0,0,0.5);
  overflow:hidden;
  position:relative;
}

.page{
  position:absolute;
  width:100%;
  height:100%;
  padding:20px;
  box-sizing:border-box;
  backface-visibility:hidden;
  transition:transform 0.6s;
}

.page h1{
  margin:0;
  font-size:26px;
}

.page p{
  font-size:14px;
}

.nav{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:10px;
}

button{
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.next{background:gold;}
.index{background:#ddd;}

</style></head><body><!-- CLOSED BOOK --><div class="book-cover" onclick="openBook()">
  <div class="cover-title">For You</div>  <div class="cover-image">Cover picture</div>  <div class="cover-vertical">When I'm Gone</div>  <div class="tap-text">TAP TO OPEN</div>
</div><!-- OPEN BOOK --><div class="book" id="book">  <!-- INDEX -->  <div class="page" id="page0">
    <h1>Book Index</h1>
    <p onclick="goTo(1)">Chapter 1 — About You</p>
    <p onclick="goTo(2)">Chapter 2 — Father</p>
    <p onclick="goTo(3)">Chapter 3 — Mother</p>
    <p onclick="goTo(4)">Chapter 4 — Brothers & Sisters</p>
    <p onclick="goTo(5)">Chapter 5 — You</p>
    <p onclick="goTo(6)">Chapter 6 — Jobs</p>
  </div>  <!-- CHAPTER SAMPLE -->  <div class="page" id="page1" style="transform:rotateY(180deg)">
    <h1>About You</h1>
    <p>Full Name: __________</p>
    <p>Birthday: __________</p><div class="nav">
  <button class="next" onclick="nextPage()">Next</button>
  <button class="index" onclick="goTo(0)">Index</button>
</div>

  </div></div><script>
let current = 0;

function openBook(){
  document.querySelector('.book-cover').style.display='none';
  document.getElementById('book').style.display='block';
}

function nextPage(){
  document.getElementById('page'+current).style.transform='rotateY(-180deg)';
  current++;
  document.getElementById('page'+current).style.transform='rotateY(0deg)';
}

function goTo(n){
  document.getElementById('page'+current).style.transform='rotateY(-180deg)';
  current=n;
  document.getElementById('page'+current).style.transform='rotateY(0deg)';
}
</script></body>
</html>
